apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-app-deployment
spec:
  replicas: 3 # Kubernetes автоматично підтримуватиме рівно 3 копії вашого додатка
  selector:
    matchLabels:
      app: todo-app
  template:
    metadata:
      labels:
        app: todo-app
    spec:
      containers:
      - name: todo-app
        # ЗАМІНІТЬ 'dobr1kq' на ваш логін Docker Hub
        image: dobr1kq/getting-started-app:latest 
        ports:
        - containerPort: 3000
        resources:
          limits:
            memory: "256Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: todo-app-service
spec:
  type: NodePort # Тип сервісу для доступу ззовні
  selector:
    app: todo-app
  ports:
    - protocol: TCP
      port: 80 # Порт сервісу всередині кластера
      targetPort: 3000 # Порт самого додатка в контейнері
      nodePort: 30001 # Порт, який ми відкриємо на вашому комп'ютері